site_name: Arkeo Multichannel API Documentation (v0.5.0)

theme:
  name: material
  logo: assets/img/logo.png
  favicon: assets/img/logo.png
  features:
    - navigation.expand
    - navigation.sections
    - navigation.instant
    - navigation.top
    - search.highlight
    - search.suggest
    - content.footnote.tooltips
    - content.code.annotate
    - content.code.copy
    - content.image.zoom
    - content.action.copy
    - content.icons
  palette:
    - media: "(prefers-color-scheme)"
      primary: teal
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference


markdown_extensions:
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      anchor_linenums: false
      linenums: false
      guess_lang: false
      use_pygments: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Introduction: index.md
  - Protocol: protocol.md
  - Getting Started: getting-started.md
  - Commands:
      - Overview: commands/index.md
      - Device Commands: commands/device.md
      - Sensor Commands: commands/sensors.md
      - Environment Commands: commands/environments.md
      - Day-Night Commands: commands/day-night.md
  - Configuration JSONs:
    - Settings: jsons/settings-json.md
    - State: jsons/state-json.md
    - Sensors: jsons/sensor-json.md
    - Environments: jsons/environment-json.md
    - JV Scan: jsons/jv-json.md
  - Examples:
    - Python: examples/python.md
  - Changelog: changelog.md

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js
  - js/katex-init.js

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css
  - assets/stylesheets/extra.css

site_url: https://docs.cicciresearch.it/arkeo-multichannel-api-docs/